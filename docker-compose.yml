services:
  cc-connect-codex:
    container_name: cc-connect-codex
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-latest}
    image: cc-connect-codex:local
    init: true
    restart: unless-stopped
    environment:
      CODEX_HOME: /root/.codex
      TZ: ${TZ:-Asia/Shanghai}
    group_add:
      - "${DOCKER_SOCK_GID:?Set DOCKER_SOCK_GID from stat -c '%g' /var/run/docker.sock}"
    volumes:
      - type: bind
        source: ./docker-data/cc-connect
        target: /root/.cc-connect
      - type: bind
        source: ${HOST_PROJECT_DIR}
        target: /workspace/project
      - type: bind
        source: ${HOST_CODEX_HOME}
        target: /root/.codex
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    ports:
      - "9820:9820"  # management API / web admin
      - "9810:9810"  # bridge websocket
